name: Open Book news feed

on:
  schedule:
    # Hourly, ~8am–10pm ET, every day (12:00–02:00 UTC ≈ 8am–10pm EDT). TWO off-peak
    # attempts per hour (:13 and :43, not :00) — a backup so a dropped run doesn't leave
    # news stale for a full hour. Idempotent (no change -> no commit), free on a public repo.
    - cron: "13,43 12-23 * * *"
    - cron: "13,43 0-2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Shared queue with the data refresh so the two never push at the same instant.
concurrency:
  group: apex-publish
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch holdings news (Google News RSS, stdlib only — no deps)
        run: python -m apex.news
      - name: Publish news feed
        run: |
          git config user.name "apex-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "No news change."
          else
            git commit -m "News refresh $(date -u +'%Y-%m-%d %H:%M')"
            git pull --rebase --autostash || true
            git push
          fi
